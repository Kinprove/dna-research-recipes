name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    name: Plugin validate (--strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code@2.1.210
      - name: Validate marketplace + plugin manifest
        run: claude plugin validate . --strict

  markdownlint:
    name: markdownlint (check-only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      # Check-only: markdownlint-cli2 does NOT modify files (no --fix). Config is the
      # committed .markdownlint-cli2.jsonc. Fix the source/generator and regenerate on a
      # finding; never format generated bytes in CI.
      - name: markdownlint-cli2
        run: npx --yes markdownlint-cli2@0.23.0 "**/*.md"

  gitleaks:
    name: Secret scan (gitleaks, fail-closed)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # -----------------------------------------------------------------------------
      # TODO (export round — cross-repo dependency, owned by the pipeline maintainer):
      #   The canonical `.gitleaks.toml` is owned by the private source repository (its
      #   pre-write export hook uses the identical file). It is copied byte-for-byte into
      #   this repo root during the export round, and this job then asserts SHA-256
      #   equality of both copies. Do NOT author a divergent `.gitleaks.toml` here.
      #   Replace the image digest below with the SAME immutable @sha256 pin used in the
      #   export pre-write hook (human version tag kept in the adjacent comment). The `dir`
      #   subcommand scans filesystem bytes (inherently no-git — there is NO `--no-git`
      #   flag on it). Fail-closed on findings AND on any non-1 nonzero scanner exit.
      # -----------------------------------------------------------------------------
      - name: gitleaks (pinned image)
        run: |
          set -euo pipefail
          if [ ! -f .gitleaks.toml ]; then
            echo "::error::.gitleaks.toml is missing — it must be copied from the canonical source during the export round."
            exit 1
          fi
          # gitleaks v8.30.1 (human tag) — immutable digest pinned below.
          docker run --rm -v "${PWD}:/scan" \
            ghcr.io/gitleaks/gitleaks:v8.30.1@sha256:c00b6bd0aeb3071cbcb79009cb16a60dd9e0a7c60e2be9ab65d25e6bc8abbb7f \
            dir --config /scan/.gitleaks.toml --exit-code 1 /scan
