# Canonical gitleaks configuration for the public dna-research-recipes skill.
#
# This is the SINGLE source of truth. `export_public_recipe.py` byte-copies it
# into the public checkout root as `.gitleaks.toml` and asserts SHA-256 equality
# both in the D1 pre-write leak guard and (mirrored) in the public-repo GitHub
# Actions run — a portability control so the two copies can never drift.
#
# `useDefault = true` makes any allowlisting below ADD to (never REPLACE) the
# gitleaks default ruleset. There are deliberately NO allowlist entries yet: the
# public tree is reviewed public content, so the gate runs the full default
# ruleset fail-closed. If a genuine false positive surfaces on the real 5-recipe
# tree (Round 2 golden run), add a NARROW, commented allowlist entry here and let
# the SHA-256-equality assertion propagate it to the public-repo copy.
title = "dna-research-recipes secret-scan config"

[extend]
useDefault = true
